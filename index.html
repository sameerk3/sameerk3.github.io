<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>[sameerk]</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #111111;
    --soft: #6b6b6b;
    --bg: #fbfbf9;
    --stack-gap: clamp(20px, 4vw, 32px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--ink);
    font-family: "Newsreader", Georgia, serif;
    padding: 32px 24px;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--stack-gap);
    text-align: center;
    animation: fade 0.8s ease both;
  }
  @keyframes fade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo {
    display: inline-flex;
    align-items: baseline;
    font-size: clamp(48px, 12vw, 96px);
    line-height: 1;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .caret {
    display: inline-block;
    width: 0.07em;
    height: 0.75em;
    background: currentColor;
    margin-left: 0.08em;
    align-self: center;
    transform: translateY(-0.08em);
    animation: blink 1.06s steps(1) infinite;
  }
  @keyframes blink {
    0%, 50%       { opacity: 1; }
    50.01%, 100%  { opacity: 0; }
  }
  .tagline {
    font-size: clamp(15px, 2.4vw, 18px);
    line-height: 1.4;
    color: var(--soft);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<main>
  <div class="logo" aria-label="sameerk">[sameerk<span class="caret" aria-hidden="true"></span></div>
  <p class="tagline">building</p>
</main>
</body>
</html>
